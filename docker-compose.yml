services:
  backend:
    build:
      context: ./Backend
      target: production
    ports:
      - "5000:5000"
    env_file:
      - ./Backend/.env
    environment:
      - NODE_ENV=production

  frontend:
    build:
      context: ./frontend
      target: production
    ports:
      - "80:80"
    depends_on:
      - backend
